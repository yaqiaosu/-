name: Build and Deploy
on:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: lock npm versions
        uses: actions/setup-node@v4
        with:
          node-version: 18.16.0
      - name: Install and build
        run: |
          npm i -g pnpm
          pnpm install
          pnpm run build:doc
      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          ACCESS_TOKEN: ${{ secrets.REACT_PROJECT }}
